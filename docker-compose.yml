services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wonbot
      POSTGRES_PASSWORD: wonbot
      POSTGRES_DB: wonbot
    ports:
      - "5432:5432"
    volumes:
      - wonbot_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  wonbot_pgdata:
